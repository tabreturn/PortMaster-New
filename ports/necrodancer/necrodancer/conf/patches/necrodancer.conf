# NecroDancer arm64 patches for standalone Mach-O loader
# Format: <virtual_address> <arm64_instruction_hex>  # comment
#
# Addresses are from the unslid binary (preferred load at 0x100000000).
# The patcher adds the ASLR slide automatically.

# --- Steam API ---
# SteamAPI::init() at 0x100302654 — skip entire Steam initialization.
# The constructor and all Steam API calls crash because stubs return NULL.
# Make init() return immediately (returns void via unique_ptr).
0x100302654 D65F03C0  # ret (skip all Steam init)

# --- Steam Controller Glyph Loading ---
# WOSClient::initAssets() calls getInputProvider() → NULL (stubbed),
# then getControllerGlyphBasePath() on null → crash. Multiple paths enter
# this block, so NOP the dangerous calls directly instead of patching guards.
0x1002d38ac D503201F  # nop (was: bl getInputProvider)
0x1002d38b0 D503201F  # nop (was: bl getControllerGlyphBasePath)
0x1002d38bc D503201F  # nop (was: bl string copy constructor)

# --- SteamBridge::onLoad() ---
# Registers ~20 Steam API lambdas as Lua script bindings.
# Lua scripts call these bindings, which crash because all underlying
# Steam functions are stubbed (return NULL). Skip the entire function.
0x100330c10 D65F03C0  # ret (skip all Steam Lua bindings)

# --- bgfx::trace() mixed-state crash ---
# Some Mach-O bgfx functions (isTextureValid, createTexture2D) have slightly
# different signatures than the native .so (extra bx::Error* param in API v118)
# so they run un-trampolined. When they call bgfx::trace(), it goes to the
# native bgfx which uses different callback state → free() on invalid pointer.
# bgfx::trace is just debug logging, safe to skip.
0x1004b074c D65F03C0  # ret (skip bgfx debug trace)

# --- LocalGame::loadLocalLeaderboards() ---
# Depends entirely on SteamSaveData which is stubbed. Return immediately.
0x100239ef4 D65F03C0  # ret (skip leaderboard loading)

# --- LocalGame::reset() null vtable ---
# Field at this+4544 points to object with null vtable (never constructed,
# likely depends on stubbed Steam/Galaxy subsystem). Skip the virtual call.
0x100239e54 14000003  # b +12 (skip vtable load + blr, jump to +40)

# --- RichPresenceHandler::process() ---
# Calls through Steam/Galaxy rich presence subsystem which is fully stubbed.
# Crashes accessing null member from stubbed AbstractRichPresence.
0x1000bc5e0 D65F03C0  # ret (skip rich presence processing)
0x1000a8ebc D65F03C0  # ret (skip rich presence processing, copy 2)

