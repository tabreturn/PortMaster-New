# NecroDancer arm64 patches for GOG build (v4.2.1-b5646, NecroDancerMP.app)
# Format: <virtual_address> <arm64_instruction_hex>  # comment
#
# Addresses are from the unslid binary (preferred load at 0x100000000).
# The patcher adds the ASLR slide automatically.
#
# Compared to the Steam patches (necrodancer.conf), the GOG build:
#   - Has no Steam API code (SteamBridge, SteamInputBridge, SteamNetworkBridge,
#     SteamWorkshopBridge, SteamAPI::init, glyph loading) — those patches omitted
#   - All remaining functions are at different addresses (Steam code removal shifts everything)
#   - Bridge "copy 2" patches omitted — patching onLoad() prevents lambda registration,
#     so inner functions are never called

# --- bgfx::trace() mixed-state crash ---
# Some Mach-O bgfx functions run un-trampolined. When they call bgfx::trace(), it goes
# to native bgfx which uses different callback state → free() on invalid pointer.
# bgfx::trace is just debug logging, safe to skip.
0x100449c98 D65F03C0  # ret (skip bgfx debug trace)

# --- LocalGame::loadLocalLeaderboards() ---
# Depends entirely on stubbed SaveData. Return immediately.
0x100237874 D65F03C0  # ret (skip leaderboard loading)

# --- LocalGame::reset() null vtable ---
# Field at this+0x11c0 points to object with null vtable (never constructed,
# likely depends on stubbed GOG Galaxy subsystem). Skip the virtual call.
0x1002377d4 14000003  # b +12 (skip vtable load + blr, jump to +40)

# --- RichPresenceHandler::process() ---
# Calls through GOG Galaxy rich presence subsystem which is fully stubbed.
# Crashes accessing null member from stubbed AbstractRichPresence.
0x1000a6a3c D65F03C0  # ret (skip rich presence processing)

# --- GOG/Network Lua Bridges ---
# These bridges register lambdas as Lua bindings that call stubbed GOG Galaxy
# APIs. When Lua scripts invoke them, they crash on NULL pointers.
# Skip onLoad() for all online-service bridges.
# UserStatsBridge
0x10019bc5c D65F03C0  # ret
# LeaderboardBridge
0x1000f8d70 D65F03C0  # ret
# RichPresenceBridge (onLoad, separate from process() above)
0x100184690 D65F03C0  # ret
# GogBridge
0x1003514e4 D65F03C0  # ret
# GogNetworkBridge
0x100358f80 D65F03C0  # ret
# BCBridge (BrainCloud)
0x100318c44 D65F03C0  # ret
# BCNetworkBridge
0x10032b760 D65F03C0  # ret
# ParentalControlsBridge
0x1001525e8 D65F03C0  # ret
# DLCBridge — handled by libgalaxy_shim.so (file-based DLC ownership)
# MumbleLinkBridge
0x1002b1a7c D65F03C0  # ret
# SaveDataBridge
0x100186e60 D65F03C0  # ret

# --- HTTP Client ---
# CurlHTTPClient::sendRequest — crashes in strlen with bad pointer
# (Apple/Linux curl ABI mismatch on string options). No internet on
# handheld anyway, so skip all HTTP requests.
# Returns shared_ptr via x8 return slot — must zero it (null shared_ptr)
# before returning, otherwise caller uses garbage as a valid object.
0x1001b27f8 A9007D1F  # stp xzr, xzr, [x8]  (zero shared_ptr return slot)
0x1001b27fc D65F03C0  # ret (CurlHTTPClient::sendRequest)
0x1005201f4 D65F03C0  # ret (BrainCloudClient::sendRequest)
