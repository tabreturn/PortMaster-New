# Dylib mapping for NecroDancer PortMaster port (GOG)
#
# Paths relative to CWD (port directory).

# === SFML ===
# Audio + System: load as Mach-O dylibs for ABI compatibility
libsfml-audio = MACHO:gamedata/NecroDancerMP.app/Contents/MacOS/libsfml-audio.2.5.dylib
libsfml-system = MACHO:gamedata/NecroDancerMP.app/Contents/MacOS/libsfml-system.2.5.dylib
# Graphics/Window/Network: native .so (window needs Linux windowing)
libsfml-graphics = libs/libsfml-graphics.so.2.5
libsfml-network = libs/libsfml-network.so.2.5
libsfml-window = libs/libsfml-window.so.2.5
libfreetype = libfreetype.so.6
libopenal = libopenal.so.1
libluajit = libluajit-5.1.so.2
libz.1 = libz.so.1
libzstd = libzstd.so.1
libcurl = libcurl.so.4
libvorbisfile = libvorbisfile.so.3
libvorbis.0 = libvorbis.so.0
libogg = libogg.so.0
libtheoradec = libtheoradec.so.1
libtheora.dylib = libtheora.so.0
libiconv = SKIP
libFLAC = libFLAC.so.8
libvorbisenc = libvorbisenc.so.2

# === System libraries ===
libc++.1 = libs/libc++.so.1
libSystem.B = libs/libsystem_shim.so
libobjc = STUB

# === Game-specific ===
libnecrolevel = MACHO:gamedata/NecroDancerMP.app/Contents/MacOS/libnecrolevel.dylib

# === Proprietary (stub out) ===
# GOG build doesn't import libsteam_api, but STUB is harmless
libsteam_api = STUB
libGalaxy = libs/libgalaxy_shim.so

# === macOS frameworks (not needed on Linux) ===
Carbon = SKIP
Cocoa = SKIP
ForceFeedback = SKIP
AudioToolbox = SKIP
CoreFoundation = SKIP
CoreAudio = SKIP
CoreHaptics = SKIP
GameController = SKIP
Metal = SKIP
Foundation = SKIP
QuartzCore = SKIP
IOKit = SKIP
AppKit = SKIP
CoreGraphics = SKIP
CoreServices = SKIP
CoreVideo = SKIP
