# Shotgun King (SDL3 version) arm64 patches for machismo
# Format: <virtual_address> <arm64_instruction_hex>  # comment
#
# Addresses are from the unslid binary (preferred load at 0x100000000).
# The patcher adds the ASLR slide automatically.

# --- Steam API ---
# sugar::steam::init_steam — replace the prologue with `mov w0, #0; ret`
# so the caller sees "Steam not initialized" without ever calling the real
# SteamAPI_Init stub.
#
# Patching at sym+0 is critical: the original post-BL patch (at sym+0x38)
# infinite-looped. After `bl SteamAPI_Init`, lr = sym+0x38; the STUB returns
# to sym+0x38; our old `ret` there used the unchanged lr and jumped back to
# sym+0x38 forever. At the prologue, lr still holds the caller's return
# address (stp x29,x30,[sp,#0x50] is on the next instruction, not yet run).
at sym:__ZN5sugar5steam10init_steamEj     D2800000  ; expect D10183FF   # mov w0, #0
at sym:__ZN5sugar5steam10init_steamEj+4   ret       ; expect A90357F6

# --- freopen NOP ---
# NOP the freopen call in mz_zip_writer_init_from_reader_v2 to prevent
# file reopen issues when the game runs from a read-only path.
0x1000c9c60 D503201F  # nop (was: bl freopen)

# --- Mono audio buffer size fix ---
# The game computes S16 buffer size as `frames << 2` (frames * 4), assuming
# stereo output from stb_vorbis. For mono files this doubles the buffer size,
# and SDL3's audio converter reads past the allocation → SIGSEGV.
# Fix: branch to island that computes `frames * channels * 2` correctly.
# Island reuses dead code in the steam init function body (patched to ret above).
#
# Original at 0x100055f1c:  lsl w8, w22, 2      ; w8 = frames * 4 (WRONG)
#            0x100055f20:  str w8, [x19, 8]    ; store buffer byte size
# Stack layout: [x29, -0x44] = channels, [x29, -0x48] = sample_rate
# Patched: branch to island, island does correct calc, branches back to 0x100055f24
0x100055f1c 1401903B  # b 0x1000ba008 (→ island in dead steam init body)
# Island (0x1000ba008-0x1000ba018, inside steam init which returns at 0x1000ba000):
0x1000ba008 B85BC3A8  # ldur w8, [x29, #-0x44]  ; load channels from stack
0x1000ba00c 1B087EC8  # mul w8, w22, w8          ; w8 = frames * channels
0x1000ba010 531F7908  # lsl w8, w8, #1           ; w8 *= 2 (sizeof int16_t)
0x1000ba014 B9000A68  # str w8, [x19, #8]        ; store buffer byte size
0x1000ba018 17FE6FC3  # b 0x100055f24            ; return to ldp w3, w2, ...
