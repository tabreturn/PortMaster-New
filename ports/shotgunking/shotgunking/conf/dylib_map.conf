# Sugar engine dylib mappings — SDL3 version (Shotgun King)
#
# Paths relative to CWD (port directory).

# System shims
libSystem.B = libs/libsystem_shim.so

# Apple-ABI libc++ (alternate SSO + Darwin pthread padding)
libc++.1 = libs/libc++.so.1

# SDL3 via sdl3forsdl2 shim — delegates to device's SDL2
libSDL3.0 = libs/libSDL3.so.0
libfreetype.6 = libfreetype.so.6

# OpenGL — not mapped here. libsystem_shim redirects the macOS
# OpenGL.framework dlopen to libGLESv2.so.2 directly.

# Steam API — stubbed (return 0/NULL for all calls)
libsteam_api = STUB
