# Machismo configuration for Shotgun King
#
# Paths are relative to CWD (set by launch script to the port directory).

[general]
dylib_map = conf/dylib_map.conf
patches = conf/patches/shotgun-king.conf

[trampoline.luajit]
lib = libluajit-5.1.so.2
prefix = _lua

# Sugar engine function replacements — PCM cache for _load_ogg so music
# tracks are decoded+resampled once, then mmap'd on subsequent runs.
# Cache files land in gamedata/shotgun_king.app/Contents/MacOS/.machismo-pcm-cache/.
[trampoline.game]
override_lib = libs/libsugar_patches_sdl3.so
