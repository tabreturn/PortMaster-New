# Dylib mapping for NecroDancer PortMaster port
#
# Paths relative to CWD (port directory).

# SDL2_image must be specified before SDL2, otherwise it does funky stuff.
SDL2_image = libSDL2_image-2.0.so.0
SDL2 = libSDL2-2.0.so.0

# === System libraries ===
libSystem.B = libs/libsystem_shim.so
libobjc = STUB

# === Game-specific ===

# === Proprietary (stub out) ===
libsteam_api = STUB
libGalaxy = STUB

# === macOS frameworks (not needed on Linux) ===
Carbon = SKIP
Cocoa = SKIP
ForceFeedback = SKIP
AudioToolbox = SKIP
CoreFoundation = SKIP
CoreAudio = SKIP
CoreHaptics = SKIP
GameController = SKIP
Metal = SKIP
Foundation = SKIP
QuartzCore = SKIP
IOKit = SKIP
AppKit = SKIP
CoreGraphics = SKIP
CoreServices = SKIP
CoreVideo = SKIP
